services:
  redis:
    image: redis:7-alpine
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1
    networks:
      - redis_network

networks:
  redis_network:
    driver: bridge

volumes:
  redis_data: